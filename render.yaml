services:
  - type: web
    name: wonderquest-learning
    runtime: node
    rootDir: app
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: starter
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_APP_NAME
        value: WonderQuest Learning
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_DB_HOST
        sync: false
      - key: SUPABASE_DB_PORT
        value: "5432"
      - key: SUPABASE_DB_NAME
        value: postgres
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: SUPABASE_DB_SSLMODE
        value: require
      - key: OWNER_ACCESS_CODE
        sync: false
      - key: TEACHER_ACCESS_CODE
        sync: false
      # ── OpenAI live question generation ───────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_QUESTION_GENERATION_ENABLED
        value: "1"
      - key: OPENAI_QUESTION_MODEL
        value: gpt-4o-mini
      - key: OPENAI_QUESTION_FALLBACK_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_QUESTION_REASONING_EFFORT
        value: low
      - key: OPENAI_QUESTION_MAX_PER_SESSION
        value: "1"
      - key: OPENAI_QUESTION_PREWARM_PER_SESSION
        value: "2"
      - key: OPENAI_QUESTION_ADAPTIVE_WAIT_MS
        value: "2500"
      # ── PostHog analytics (server + browser) ────────────────────────────────
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: "https://us.i.posthog.com"
      # Browser SDK — same key, NEXT_PUBLIC_ prefix so Next.js exposes it to the client
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_HOST
        value: "https://us.i.posthog.com"
