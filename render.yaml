services:
  - type: web
    name: wonderquest-learning
    runtime: node
    rootDir: app
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_APP_NAME
        value: WonderQuest Learning
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_DB_HOST
        sync: false
      - key: SUPABASE_DB_PORT
        value: "5432"
      - key: SUPABASE_DB_NAME
        value: postgres
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: SUPABASE_DB_SSLMODE
        value: require
      - key: OWNER_ACCESS_CODE
        sync: false
      - key: TEACHER_ACCESS_CODE
        sync: false
