name: Production Route Check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  render-route-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RENDER_BASE_URL: https://wonderquest-learning.onrender.com
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run production route check
        run: ./tools/render_post_setup_check.sh "$RENDER_BASE_URL"
